<script>
let currentUser=null,pos=[],vendors=[];
document.addEventListener('DOMContentLoaded',async()=>{await loadUserInfo();await loadDashboard();setupListeners()});
async function loadUserInfo(){try{currentUser=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getCurrentUser()});document.getElementById('userName').textContent=currentUser.name||currentUser.email;document.getElementById('userRole').textContent=currentUser.role||'Employee';document.getElementById('userAvatar').textContent=(currentUser.name||'U').charAt(0).toUpperCase();if(currentUser.role==='Manager'||currentUser.role==='Finance Admin'||currentUser.role==='Admin'){document.querySelectorAll('.manager-only').forEach(el=>el.style.display='flex');await loadApprovals()}}catch(e){}}
function setupListeners(){document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>{if(b.dataset.view)switchView(b.dataset.view)})});document.getElementById('newPOBtn').addEventListener('click',()=>switchView('new-po'));document.getElementById('poForm').addEventListener('submit',handleCreatePO);document.querySelectorAll('.line-item input').forEach(i=>i.addEventListener('input',calculateTotal)}
function switchView(view){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view+'View'));document.getElementById('pageTitle').textContent={dashboard:'Dashboard','po-list':'Purchase Orders','new-po':'New PO',approvals:'Approvals'}[view]||'Dashboard';if(view==='po-list')renderPOs();if(view==='new-po')loadVendors()}
async function loadDashboard(){try{pos=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllPOs()});document.getElementById('statTotal').textContent=pos.length;document.getElementById('statPending').textContent=pos.filter(p=>p.status.includes('Pending')).length;document.getElementById('statApproved').textContent=pos.filter(p=>p.status==='Approved'||p.status==='Ordered'||p.status==='Received').length;document.getElementById('statValue').textContent='$'+pos.reduce((s,p)=>s+p.totalAmount,0).toLocaleString();renderRecentPOs(pos.slice(0,5))}catch(e){}}
function renderRecentPOs(pList){const container=document.getElementById('recentPOs');if(!pList.length){container.innerHTML='<p style="text-align:center;color:var(--gray-500);padding:40px">No purchase orders yet</p>';return}container.innerHTML='<h3>Recent Purchase Orders</h3>'+pList.map(p=>`<div class="po-card"><div class="po-header"><span class="po-id">${p.poID}</span><span class="status-badge ${p.status.toLowerCase().replace(' ','')}">${p.status}</span></div><div><span class="po-total">$${p.totalAmount.toLocaleString()}</span></div><div class="po-meta">Department: ${p.department} · ${p.createdAt?new Date(p.createdAt).toLocaleDateString():''}</div></div>`).join('')}
async function renderPOs(){try{pos=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllPOs()});document.getElementById('poList').innerHTML=pos.length?pos.map(p=>`<div class="po-card"><div class="po-header"><span class="po-id">${p.poID}</span><span class="status-badge ${p.status.toLowerCase().replace(' ','')}">${p.status}</span></div><div><span class="po-total">$${p.totalAmount.toLocaleString()}</span></div><div class="po-meta">Department: ${p.department} · ${p.createdAt?new Date(p.createdAt).toLocaleDateString():''}</div></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No purchase orders yet</p>'}catch(e){showToast('Failed to load POs','error')}}
async function loadVendors(){try{vendors=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllVendors()});document.getElementById('vendorSelect').innerHTML='<option value="">Select vendor</option>'+vendors.map(v=>`<option value="${v.vendorID}">${v.name}</option>`).join('')}catch(e){}}
function addLine(){const container=document.getElementById('lineItems');const div=document.createElement('div');div.className='line-item';div.innerHTML='<input type="text" placeholder="Item code" class="item-code"><input type="text" placeholder="Description" class="item-desc"><input type="number" placeholder="Qty" class="item-qty" oninput="calculateTotal()"><input type="number" placeholder="Price" class="item-price" oninput="calculateTotal()"><button type="button" class="btn-remove" onclick="removeLine(this)">&times;</button>';container.appendChild(div)}
function removeLine(btn){btn.parentElement.remove();calculateTotal()}
function calculateTotal(){let total=0;document.querySelectorAll('.line-item').forEach(row=>{const qty=parseFloat(row.querySelector('.item-qty').value)||0;const price=parseFloat(row.querySelector('.item-price').value)||0;total+=qty*price});document.getElementById('poTotalAmount').textContent=total.toFixed(2)}
async function handleCreatePO(e){e.preventDefault();const lineItems=[];document.querySelectorAll('.line-item').forEach(row=>{const code=row.querySelector('.item-code').value;const desc=row.querySelector('.item-desc').value;const qty=parseFloat(row.querySelector('.item-qty').value);const price=parseFloat(row.querySelector('.item-price').value);if(code&&desc&&qty&&price)lineItems.push({code,description:desc,quantity:qty,unitPrice:price})});if(!lineItems.length){showToast('Add at least one line item','error');return}try{await new Promise((r,rej)=>{google.script.run.withSuccessHandler(r).withFailureHandler(rej).createPO(document.getElementById('vendorSelect').value,document.getElementById('department').value,document.getElementById('expectedDelivery').value,document.getElementById('poNotes').value,lineItems)});showToast('PO created!','success');document.getElementById('poForm').reset();document.getElementById('lineItems').innerHTML='<div class="line-item"><input type="text" placeholder="Item code" class="item-code"><input type="text" placeholder="Description" class="item-desc"><input type="number" placeholder="Qty" class="item-qty" oninput="calculateTotal()"><input type="number" placeholder="Price" class="item-price" oninput="calculateTotal()"><button type="button" class="btn-remove" onclick="removeLine(this)">&times;</button></div>';calculateTotal();switchView('po-list')}catch(e){showToast(e.message||'Failed to create PO','error')}}
async function loadApprovals(){try{const pending=pos.filter(p=>p.status.includes('Pending'));document.getElementById('approvalsList').innerHTML=pending.length?pending.map(p=>`<div class="approval-card"><div class="approval-info"><div class="po-id">${p.poID}</div><div>$${p.totalAmount.toLocaleString()}</div><div class="po-meta">${p.department}</div></div><div class="approval-actions"><button class="btn btn-success btn-sm" onclick="approvePO('${p.poID}')">Approve</button></div></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No pending approvals</p>';const badge=document.getElementById('approvalBadge');if(pending.length>0){badge.textContent=pending.length;badge.style.display='inline'}}catch(e){}}
async function approvePO(poID){try{await new Promise((r,rej)=>{google.script.run.withSuccessHandler(r).withFailureHandler(rej).approveByManager(poID)});showToast('PO approved!','success');loadDashboard();loadApprovals()}catch(e){showToast(e.message||'Failed to approve','error')}}
function showToast(m,t='success'){const c=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className=`toast ${t}`;toast.innerHTML=`<span>${m}</span>`;c.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},3000)}
</script>
