<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#667EEA;--secondary:#764BA2;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--purple:#8B5CF6;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--shadow:0 4px 6px -1px rgba(0,0,0,0.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1);--radius:12px;--radius-lg:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Roboto,sans-serif;background:var(--gray-100);color:var(--gray-800);line-height:1.5;overflow:hidden}
.app-container{display:flex;height:100vh}
.sidebar{width:260px;background:linear-gradient(180deg,#1F2937,#111827);color:white;display:flex;flex-direction:column}
.sidebar-header{padding:24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.po-logo{width:40px;height:40px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:18px;font-weight:600}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:transparent;border:none;color:var(--gray-400);font-size:14px;font-weight:500;border-radius:var(--radius);cursor:pointer;transition:all 0.2s;width:100%}
.nav-item:hover{background:rgba(255,255,255,0.1);color:white}
.nav-item.active{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white}
.badge{margin-left:auto;background:var(--danger);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.1)}
.user-info{display:flex;align-items:center;gap:12px;padding:8px;border-radius:var(--radius);background:rgba(255,255,255,0.05)}
.user-avatar{width:40px;height:40px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
.user-name{font-weight:600;font-size:14px}.user-role{font-size:12px;color:var(--gray-400)}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:white;padding:16px 32px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:24px;font-weight:600}
.content-area{flex:1;padding:24px 32px;overflow-y:auto}
.view{display:none;animation:fadeIn 0.3s}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px}
.stat-icon{width:56px;height:56px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.stat-icon.primary{background:rgba(59,130,246,0.1);color:#3B82F6}
.stat-icon.warning{background:rgba(245,158,11,0.1);color:var(--warning)}
.stat-icon.success{background:rgba(16,185,129,0.1);color:var(--success)}
.stat-icon.purple{background:rgba(139,92,246,0.1);color:var(--purple)}
.stat-label{font-size:14px;color:var(--gray-500);display:block}.stat-value{font-size:24px;font-weight:700;color:var(--gray-800)}
.recent-pos,.po-list,.approvals-list{background:white;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow)}
.recent-pos h3,.approvals-list h2{font-size:16px;font-weight:600;margin-bottom:16px}
.po-card,.approval-card{background:var(--gray-50);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all 0.2s}
.po-card:hover,.approval-card:hover{background:var(--gray-100)}
.po-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.po-id{font-family:monospace;font-weight:600;color:var(--gray-700)}.po-total{font-size:20px;font-weight:700;color:var(--primary)}
.po-meta{font-size:13px;color:var(--gray-500)}
.status-badge{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.status-badge.draft{background:var(--gray-200);color:var(--gray-600)}
.status-badge.pending{background:rgba(245,158,11,0.15);color:var(--warning)}
.status-badge.approved{background:rgba(16,185,129,0.15);color:var(--success)}
.status-badge.ordered{background:rgba(59,130,246,0.15);color:#3B82F6}
.status-badge.received{background:rgba(16,185,129,0.15);color:var(--success)}
.status-badge.rejected{background:rgba(239,68,68,0.15);color:var(--danger)}
.form-card{background:white;border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow);max-width:800px}
.form-card h2{font-size:20px;font-weight:600;margin-bottom:24px}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:14px;font-weight:500;color:var(--gray-700);margin-bottom:8px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:2px solid var(--gray-200);border-radius:var(--radius);font-size:14px;transition:all 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.line-items-section{margin:24px 0;padding:20px;background:var(--gray-50);border-radius:var(--radius)}
.line-items-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.line-item{display:grid;grid-template-columns:1fr 2fr 80px 100px 40px;gap:8px;margin-bottom:8px}
.line-item input{padding:10px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px}
.btn-remove{width:40px;height:40px;border:none;background:var(--danger);color:white;border-radius:8px;cursor:pointer;font-size:20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white}
.btn-primary:hover{box-shadow:var(--shadow-lg)}
.btn-secondary{background:var(--gray-200);color:var(--gray-700)}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-sm{padding:6px 12px;font-size:12px}
.po-total{text-align:right;font-size:20px;margin:16px 0;padding:16px;background:var(--gray-50);border-radius:var(--radius)}
.form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px}
.approval-card{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.approval-info{flex:1}
.approval-actions{display:flex;gap:8px}
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:1000}
.toast{display:flex;align-items:center;gap:12px;padding:16px 20px;background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);animation:slideIn 0.3s;min-width:300px}
@keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}
@media(max-width:768px){.sidebar{width:80px}.sidebar-header{padding:16px;justify-content:center}.logo-text,.nav-item span,.user-details{display:none}.nav-item{justify-content:center;padding:12px}.stats-row{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}.line-item{grid-template-columns:1fr}}
</style>
