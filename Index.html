<!DOCTYPE html>
<html lang="en">
<head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Purchase Order Management</title><?!= include('Stylesheet'); ?></head>
<body>
<div class="app-container">
<aside class="sidebar"><div class="sidebar-header"><div class="logo po-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg></div><span class="logo-text">Purchase Orders</span></div>
<nav class="sidebar-nav">
<button class="nav-item active" data-view="dashboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Dashboard</span></button>
<button class="nav-item" data-view="po-list"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg><span>All POs</span></button>
<button class="nav-item" data-view="new-po"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg><span>New PO</span></button>
<button class="nav-item manager-only" data-view="approvals" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline></svg><span>Approvals</span><span class="badge" id="approvalBadge" style="display:none">0</span></button>
</nav>
<div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="userAvatar">U</div><div class="user-details"><span class="user-name" id="userName">Loading...</span><span class="user-role" id="userRole">-</span></div></div></div>
</aside>
<main class="main-content">
<header class="top-bar"><h1 class="page-title" id="pageTitle">Dashboard</h1><button class="btn btn-primary" id="newPOBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> New PO</button></header>
<div class="content-area">
<section class="view active" id="dashboardView">
<div class="stats-row"><div class="stat-card"><div class="stat-icon primary"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg></div><div><span class="stat-label">Total POs</span><span class="stat-value" id="statTotal">0</span></div></div><div class="stat-card"><div class="stat-icon warning"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div><div><span class="stat-label">Pending</span><span class="stat-value" id="statPending">0</span></div></div><div class="stat-card"><div class="stat-icon success"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg></div><div><span class="stat-label">Approved</span><span class="stat-value" id="statApproved">0</span></div></div><div class="stat-card"><div class="stat-icon purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line></svg></div><div><span class="stat-label">Total Value</span><span class="stat-value" id="statValue">$0</span></div></div></div>
<div class="recent-pos" id="recentPOs"></div>
</section>
<section class="view" id="poListView"><div class="po-list" id="poList"></div></section>
<section class="view" id="newPOView"><div class="form-card"><h2>Create Purchase Order</h2><form id="poForm"><div class="form-group"><label>Vendor</label><select id="vendorSelect" required><option value="">Select vendor</option></select></div><div class="form-row"><div class="form-group"><label>Department</label><input type="text" id="department" required></div><div class="form-group"><label>Expected Delivery</label><input type="date" id="expectedDelivery"></div></div><div class="line-items-section"><h3>Line Items</h3><div id="lineItems"><div class="line-item"><input type="text" placeholder="Item code" class="item-code"><input type="text" placeholder="Description" class="item-desc"><input type="number" placeholder="Qty" class="item-qty"><input type="number" placeholder="Price" class="item-price"><button type="button" class="btn-remove" onclick="removeLine(this)">&times;</button></div></div><button type="button" class="btn btn-secondary" onclick="addLine()">+ Add Item</button></div><div class="form-group"><label>Notes</label><textarea id="poNotes" rows="2"></textarea></div><div class="po-total"><strong>Total: $</strong><span id="poTotalAmount">0.00</span></div><div class="form-actions"><button type="submit" class="btn btn-primary">Create PO</button></div></form></div></section>
<section class="view" id="approvalsView"><h2>Pending Approvals</h2><div class="approvals-list" id="approvalsList"></div></section>
</div>
</main>
</div>
<div class="toast-container" id="toastContainer"></div>
<?!= include('JavaScript'); ?>
</body>
</html>
